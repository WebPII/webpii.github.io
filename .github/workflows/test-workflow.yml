name: Smoke Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - code

env:
  PYTHON_VERSION: "3.11"

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui_reproducer/template/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
          npm ci --prefix ui_reproducer/template

      - name: Check anonymization
        run: python scripts/check_release.py

      - name: Run smoke test
        run: bash scripts/smoke_test.sh
